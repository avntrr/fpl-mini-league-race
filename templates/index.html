<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPL Race Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 36px 32px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
    }

    .logo { font-size: 28px; margin-bottom: 8px; }

    h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; color: #111; }

    .subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 7px;
    }

    input[type="number"], select {
      width: 100%;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      color: #111;
      padding: 10px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color .15s;
      appearance: none;
    }
    input[type="number"]:focus, select:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.12); }

    .hint {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 6px;
      line-height: 1.5;
    }
    .hint b { color: #6b7280; }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 24px;
      cursor: pointer;
      user-select: none;
    }
    .checkbox-row input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: #3b82f6;
      cursor: pointer;
    }
    .checkbox-row span { font-size: 13px; color: #6b7280; }

    .btn {
      width: 100%;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn:hover:not(:disabled) { background: #15803d; }
    .btn:disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; }

    /* Status box */
    .status-box {
      display: none;
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 9px;
      font-size: 13px;
      line-height: 1.6;
    }
    .status-box.running {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
    }
    .status-box.done {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #15803d;
    }
    .status-box.error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 11px; height: 11px;
      border: 2px solid #3b82f6;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .75s linear infinite;
      margin-right: 7px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Download button */
    .dl-btn {
      display: block;
      margin-top: 13px;
      background: #3b82f6;
      color: #fff;
      text-decoration: none;
      text-align: center;
      padding: 11px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      transition: background .15s;
    }
    .dl-btn:hover { background: #2563eb; }

    .league-name {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⚽</div>
    <h1>FPL Race Generator</h1>
    <p class="subtitle">Generate animasi bar chart race dari mini league Fantasy Premier League kamu.</p>

    <div class="field">
      <label for="league_id">League ID</label>
      <input type="number" id="league_id" placeholder="Contoh: 154649" min="1">
      <p class="hint">
        Buka liga di FPL → lihat URL:<br>
        <b>fantasy.premierleague.com/leagues/<u>XXXXXX</u>/standings/c</b>
      </p>
    </div>

    <div class="field">
      <label for="top_n">Tampilkan tim</label>
      <select id="top_n">
        <option value="5">Top 5</option>
        <option value="8">Top 8</option>
        <option value="10" selected>Top 10</option>
        <option value="15">Top 15</option>
        <option value="20">Top 20</option>
      </select>
    </div>

    <div class="field">
      <label for="fps">Kualitas video</label>
      <select id="fps">
        <option value="30" selected>30fps — Standard (render lebih cepat)</option>
        <option value="60">60fps — Smooth (render ~2× lebih lama)</option>
      </select>
    </div>

    <label class="checkbox-row">
      <input type="checkbox" id="force_refresh">
      <span>Force refresh (skip cache, ambil data terbaru)</span>
    </label>

    <button class="btn" id="btn" onclick="generate()">Generate Video</button>

    <div class="status-box" id="status"></div>
  </div>

  <script>
    let pollTimer = null;

    async function generate() {
      const leagueId = document.getElementById('league_id').value.trim();
      const topN = document.getElementById('top_n').value;
      const fps = parseInt(document.getElementById('fps').value);
      const forceRefresh = document.getElementById('force_refresh').checked;

      if (!leagueId) {
        showStatus('error', '⚠️ Masukkan League ID terlebih dahulu.');
        return;
      }

      setBtn(true);
      showStatus('running', '<span class="spinner"></span>Menghubungi server...');

      try {
        const res = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ league_id: leagueId, top_n: topN, force_refresh: forceRefresh, fps }),
        });
        const json = await res.json();
        if (json.error) { showStatus('error', '❌ ' + json.error); setBtn(false); return; }
        poll(json.job_id);
      } catch (e) {
        showStatus('error', '❌ Tidak bisa terhubung ke server.');
        setBtn(false);
      }
    }

    function poll(jobId) {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(async () => {
        try {
          const job = await fetch('/status/' + jobId).then(r => r.json());

          if (job.status === 'pending' || job.status === 'running') {
            showStatus('running', '<span class="spinner"></span>' + job.message);
          } else if (job.status === 'done') {
            clearInterval(pollTimer);
            showStatus('done',
              (job.league_name ? `<div class="league-name">🏆 ${job.league_name}</div>` : '') +
              '✅ ' + job.message +
              `<a class="dl-btn" href="/download/${job.filename}" download>⬇️ Download MP4</a>`
            );
            setBtn(false);
          } else {
            clearInterval(pollTimer);
            showStatus('error', '❌ ' + job.message);
            setBtn(false);
          }
        } catch (_) { /* network hiccup, teruskan polling */ }
      }, 2000);
    }

    function showStatus(type, html) {
      const el = document.getElementById('status');
      el.className = 'status-box ' + type;
      el.style.display = 'block';
      el.innerHTML = html;
    }

    function setBtn(disabled) {
      document.getElementById('btn').disabled = disabled;
    }
  </script>
</body>
</html>
